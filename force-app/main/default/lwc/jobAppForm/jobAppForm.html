<template>
    <lightning-card title="Job Application Form">
        <div class="slds-p-around_medium">
            <lightning-input
                label="Company"
                value={company}
                onchange={handleCompanyChange}>
            </lightning-input>

            <lightning-input
                label="Role"
                value={role}
                onchange={handleRoleChange}
                class="slds-m-top_small">
            </lightning-input>

            <lightning-button
                label="Add"
                variant="brand"
                onclick={handleAdd}
                class="slds-m-top_small">
            </lightning-button>

            <template if:true={showPreview}>
                <div class="slds-m-top_medium slds-box slds-theme_default">
                    <p><strong>Preview:</strong></p>
                    <p>Company: {company}</p>
                    <p>Role: {role}</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
