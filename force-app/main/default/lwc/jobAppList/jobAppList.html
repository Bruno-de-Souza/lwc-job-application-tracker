<template>
    
    <lightning-card title="Job Applications List">

        <div class="slds-p-around_medium">

            <template if:true={applications}>

                <lightning-datatable
                    key-field="Id"
                    data={applications}
                    columns={columns}
                    onrowaction={handledRowAction}
                    hide-checkbox-column>
                </lightning-datatable>

            </template>

            <template if:true={error}>

                <div class="slds-text-color_error">

                    Error loading applications!

                </div>

            </template>

        </div>

    </lightning-card>

</template>
